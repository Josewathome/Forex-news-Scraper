services:

  scraper:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: econ_calendar_scraper
    restart: unless-stopped

    ports:
      - "8000:8000"

    environment:
      # Playwright must know where browsers are installed
      PLAYWRIGHT_BROWSERS_PATH: /root/.cache/ms-playwright

      # Python output unbuffered so logs appear immediately
      PYTHONUNBUFFERED: "1"

      # Timezone — ForexFactory times are displayed in this zone
      TZ: America/New_York

    # Chromium needs a larger shared memory space than Docker's 64 MB default.
    # Without this it crashes on heavy pages.
    shm_size: "1gb"

    # Health check hits /health every 30s.
    # Container is marked unhealthy if 3 consecutive checks fail.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s      # give the browser time to warm up before first check

    # Resource limits — Chromium is memory-hungry
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "2g"
        reservations:
          cpus: "0.5"
          memory: "512m"

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

    volumes:
      # Optional: mount a local dir to persist logs outside the container
      - ./logs:/app/logs

    networks:
      - scraper_net


networks:
  scraper_net:
    driver: bridge