# docker-compose.yml
# ─────────────────────────────────────────────────────────────────────────────
# Deploy with:
#   docker compose up --build -d
#
# Secrets are injected via GitHub Actions / CI:
#   DASHBOARD_USERNAME, DASHBOARD_PASSWORD, JWT_SECRET, ENCRYPTION_KEY
#
# Two named volumes provide persistence across restarts:
#   api_data  – encrypted API keys  (data/api_keys.json)
#   api_logs  – rotating request logs (logs/YYYY-MM-DD.json)
# ─────────────────────────────────────────────────────────────────────────────

services:
  forex-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: forex-api:latest
    container_name: forex-api

    ports:
      - "8087:8000"

    # ── Persistent volumes ─────────────────────────────────────────────── #
    volumes:
      - api_data:/app/data   # encrypted API keys survive restarts
      - api_logs:/app/logs   # rolling request logs (3-day retention)

    # ── Runtime env (override with deployment secrets) ─────────────────── #
    environment:
      DATA_DIR: /app/data
      LOGS_DIR: /app/logs

      # Provide these via GitHub Actions secrets / CI pipeline:
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-admin}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-changeme}
      JWT_SECRET:         ${JWT_SECRET:-CHANGE_IN_PRODUCTION}
      ENCRYPTION_KEY:     ${ENCRYPTION_KEY:-CHANGE_IN_PRODUCTION_32CHAR}
      JWT_EXPIRY_HOURS:   ${JWT_EXPIRY_HOURS:-24}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-3}

    restart: unless-stopped

    # Simple health-check: hits the /health endpoint every 30 s
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  api_data:
    driver: local
  api_logs:
    driver: local