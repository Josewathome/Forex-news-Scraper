# docker-compose.yml
# ─────────────────────────────────────────────────────────────────────────────
# Deploy with:
#   docker compose up --build -d
#
# Secrets are injected via GitHub Actions / CI:
#   DASHBOARD_USERNAME, DASHBOARD_PASSWORD, JWT_SECRET, ENCRYPTION_KEY
#
# Two bind mounts provide persistence across restarts AND direct host access.
# Paths are relative to this file — they resolve to the project root on the
# host, sitting alongside main.py:
#   ./data  →  /app/data   (SQLite database)
#   ./logs  →  /app/logs   (rotating application logs)
# ─────────────────────────────────────────────────────────────────────────────

services:
  forex-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: forex-api:latest
    container_name: forex-api

    ports:
      - "8087:8000"

    # ── Bind mounts — relative to this docker-compose.yml file ────────────── #
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

    # ── Runtime env ───────────────────────────────────────────────────────── #
    environment:
      DATA_DIR: /app/data
      LOGS_DIR: /app/logs

      # Provided via GitHub Actions secrets / CI pipeline:
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-admin}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-changeme}
      JWT_SECRET:         ${JWT_SECRET:-CHANGE_IN_PRODUCTION}
      ENCRYPTION_KEY:     ${ENCRYPTION_KEY:-CHANGE_IN_PRODUCTION_32CHAR}
      JWT_EXPIRY_HOURS:   ${JWT_EXPIRY_HOURS:-24}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-3}

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s