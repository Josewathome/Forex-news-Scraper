# docker-compose.yml
# ─────────────────────────────────────────────────────────────────────────────
# Deploy with:
#   docker compose up --build -d
#
# Secrets are injected via GitHub Actions / CI:
#   DASHBOARD_USERNAME, DASHBOARD_PASSWORD, JWT_SECRET, ENCRYPTION_KEY,
#   DATA_DIR, LOGS_DIR
#
# Two bind mounts provide persistence across restarts AND direct host access:
#   ${DATA_DIR} → /app/data  – SQLite database (forex_api.db)
#   ${LOGS_DIR} → /app/logs  – rotating application logs (app.log)
#
# DATA_DIR and LOGS_DIR must be absolute paths on the host, e.g.:
#   DATA_DIR=/home/gre8/forexnews.gre8i.com/Forex-news-Scraper/data
#   LOGS_DIR=/home/gre8/forexnews.gre8i.com/Forex-news-Scraper/logs
# ─────────────────────────────────────────────────────────────────────────────

services:
  forex-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: forex-api:latest
    container_name: forex-api

    ports:
      - "8087:8000"

    # ── Bind mounts — host paths come from deployment env vars ────────────── #
    # The left side (${VAR}) is the absolute host path.
    # The right side is always the fixed container-internal path.
    volumes:
      - ${DATA_DIR}:/app/data
      - ${LOGS_DIR}:/app/logs

    # ── Runtime env ───────────────────────────────────────────────────────── #
    # DATA_DIR / LOGS_DIR here are the container-internal paths — always fixed.
    # The host-side paths are handled by the volume bind mounts above.
    environment:
      DATA_DIR: /app/data
      LOGS_DIR: /app/logs

      # Provided via GitHub Actions secrets / CI pipeline:
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-admin}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-changeme}
      JWT_SECRET:         ${JWT_SECRET:-CHANGE_IN_PRODUCTION}
      ENCRYPTION_KEY:     ${ENCRYPTION_KEY:-CHANGE_IN_PRODUCTION_32CHAR}
      JWT_EXPIRY_HOURS:   ${JWT_EXPIRY_HOURS:-24}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-3}

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s