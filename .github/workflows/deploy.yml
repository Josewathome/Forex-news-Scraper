name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy project
        run: |
          rsync -av --delete \
          --exclude '.git' \
          ./ ~/apps/myproject/

      - name: Deploy
        run: |
          cd ~/apps/myproject

          docker compose down

          docker compose build

          docker compose up -d
