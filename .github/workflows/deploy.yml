name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # 1. Checkout
      # -----------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------
      # 2. Setup SSH
      # -----------------------------
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      # -----------------------------
      # 3. Add server to known_hosts
      # -----------------------------
      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # -----------------------------
      # 4. Ensure directories exist
      # -----------------------------
      - name: Ensure directories
        run: |
          ssh -p ${{ secrets.SSH_PORT }} root@${{ secrets.SSH_HOST }} << 'ENDSSH'
          mkdir -p /home/gre8/forexnews.gre8i.com/Forex-news-Scraper/logs
          mkdir -p /home/gre8/forexnews.gre8i.com/Forex-news-Scraper/data
          ENDSSH

      # -----------------------------
      # 5. Sync code
      # -----------------------------
      - name: Sync code to server
        run: |
          rsync -avz \
            -e "ssh -p ${{ secrets.SSH_PORT }}" \
            --exclude ".git" \
            --exclude ".env" \
            --exclude "node_modules" \
            --exclude "logs/" \
            --exclude "data/" \
            ./ \
            root@${{ secrets.SSH_HOST }}:/home/gre8/forexnews.gre8i.com/Forex-news-Scraper

      # -----------------------------
      # 6. Deploy
      # -----------------------------
      - name: Deploy application
        run: |
          ssh -p ${{ secrets.SSH_PORT }} root@${{ secrets.SSH_HOST }} << ENDSSH

          cd /home/gre8/forexnews.gre8i.com/Forex-news-Scraper

          echo "Pulling latest images..."
          docker compose pull

          echo "Building containers..."
          docker compose build

          echo "Starting services..."
          DASHBOARD_USERNAME="${{ secrets.DASHBOARD_USERNAME }}" \
          DASHBOARD_PASSWORD="${{ secrets.DASHBOARD_PASSWORD }}" \
          JWT_SECRET="${{ secrets.JWT_SECRET }}" \
          ENCRYPTION_KEY="${{ secrets.ENCRYPTION_KEY }}" \
          DATA_DIR=/app/data \
          LOGS_DIR=/app/logs \
          docker compose up -d

          echo "Deployment complete"
          ENDSSH