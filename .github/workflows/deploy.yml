name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # 1. Checkout
      # -----------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------
      # 2. Setup SSH
      # -----------------------------
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      # -----------------------------
      # 3. Add server to known_hosts
      # -----------------------------
      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # -----------------------------
      # 4. Ensure directories exist
      # -----------------------------
      - name: Ensure directories
        run: |
          ssh -p ${{ secrets.SSH_PORT }} root@${{ secrets.SSH_HOST }} << 'ENDSSH'
          mkdir -p /home/gre8/forexnews.gre8i.com/Forex-news-Scraper/logs
          mkdir -p /home/gre8/forexnews.gre8i.com/Forex-news-Scraper/data
          ENDSSH

      # -----------------------------
      # 5. Sync code
      # -----------------------------
      - name: Sync code to server
        run: |
          rsync -avz \
            -e "ssh -p ${{ secrets.SSH_PORT }}" \
            --exclude ".git" \
            --exclude ".env" \
            --exclude "node_modules" \
            --exclude "logs/" \
            --exclude "data/" \
            ./ \
            root@${{ secrets.SSH_HOST }}:/home/gre8/forexnews.gre8i.com/Forex-news-Scraper

      # -----------------------------
      # 6. Deploy
      # -----------------------------
      - name: Deploy application
        run: |
          # Base64 encode secrets on the runner so special characters
          # cannot break shell substitution on the remote server
          B64_USER=$(printf '%s' '${{ secrets.DASHBOARD_USERNAME }}' | base64 -w 0)
          B64_PASS=$(printf '%s' '${{ secrets.DASHBOARD_PASSWORD }}' | base64 -w 0)
          B64_JWT=$(printf '%s' '${{ secrets.JWT_SECRET }}' | base64 -w 0)
          B64_ENC=$(printf '%s' '${{ secrets.ENCRYPTION_KEY }}' | base64 -w 0)
          B64_ENC=$(printf '%s' '${{ secrets.JWT_EXPIRY_HOURS }}' | base64 -w 0)
          B64_ENC=$(printf '%s' '${{ secrets.DATA_DIR }}' | base64 -w 0)
          B64_ENC=$(printf '%s' '${{ secrets.LOGS_DIR }}' | base64 -w 0)
          B64_ENC=$(printf '%s' '${{ secrets.LOG_RETENTION_DAYS }}' | base64 -w 0)

          ssh -p ${{ secrets.SSH_PORT }} root@${{ secrets.SSH_HOST }} << ENDSSH

          cd /home/gre8/forexnews.gre8i.com/Forex-news-Scraper

          # Decode on the server — values only exist in memory this session
          export DASHBOARD_USERNAME="\$(echo '$B64_USER' | base64 -d)"
          export DASHBOARD_PASSWORD="\$(echo '$B64_PASS' | base64 -d)"
          export JWT_SECRET="\$(echo '$B64_JWT' | base64 -d)"
          export ENCRYPTION_KEY="\$(echo '$B64_ENC' | base64 -d)"
          export JWT_EXPIRY_HOURS="\$(echo '$B64_ENC' | base64 -d)"
          export DATA_DIR="\$(echo '$B64_ENC' | base64 -d)"
          export LOGS_DIR="\$(echo '$B64_ENC' | base64 -d)"
          export LOG_RETENTION_DAYS="\$(echo '$B64_ENC' | base64 -d)"
          
          echo "Pulling latest images..."
          docker compose pull

          echo "Building containers..."
          docker compose build

          echo "Starting services..."
          docker compose up -d

          echo "Deployment complete"
          ENDSSH