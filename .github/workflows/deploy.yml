name: Deploy (Debug)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # 1. Checkout
      # -----------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------
      # 2. Setup SSH
      # -----------------------------
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      # -----------------------------
      # 3. Debug: Print SSH info
      # -----------------------------
      - name: Debug SSH config
        run: |
          echo "SSH HOST: ${{ secrets.SSH_HOST }}"
          echo "SSH PORT: ${{ secrets.SSH_PORT }}"
          echo "User: root"

      # -----------------------------
      # 4. Add known_hosts
      # -----------------------------
      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # -----------------------------
      # 5. Debug: Test SSH connection (VERBOSE)
      # -----------------------------
      - name: Test SSH connection
        run: |
          ssh -vvv -p ${{ secrets.SSH_PORT }} root@${{ secrets.SSH_HOST }} "echo '✅ SSH SUCCESS'"

      # -----------------------------
      # 6. Debug: Check remote access
      # -----------------------------
      - name: Check server access
        run: |
          ssh -p ${{ secrets.SSH_PORT }} root@${{ secrets.SSH_HOST }} << 'ENDSSH'
          echo "Connected to server"
          whoami
          pwd
          ls -la
          ENDSSH

      # -----------------------------
      # 7. Ensure directories
      # -----------------------------
      - name: Ensure directories
        run: |
          ssh -p ${{ secrets.SSH_PORT }} root@${{ secrets.SSH_HOST }} << 'ENDSSH'
          mkdir -p /home/gre8/forexnews.gre8i.com/Forex-news-Scraper/src/logs
          mkdir -p /home/gre8/forexnews.gre8i.com/Forex-news-Scraper/src/data
          echo "Directories created"
          ENDSSH

      # -----------------------------
      # 8. Debug: Test rsync
      # -----------------------------
      - name: Test rsync
        run: |
          rsync -avz \
            -e "ssh -p ${{ secrets.SSH_PORT }}" \
            ./ \
            root@${{ secrets.SSH_HOST }}:/home/gre8/forexnews.gre8i.com/Forex-news-Scraper

      # -----------------------------
      # 9. Deploy (only runs if above works)
      # -----------------------------
      - name: Deploy application
        run: |
          ssh -p ${{ secrets.SSH_PORT }} root@${{ secrets.SSH_HOST }} << 'ENDSSH'

          cd /home/gre8/forexnews.gre8i.com/Forex-news-Scraper

          echo "Starting deployment..."
          docker compose ps

          docker compose pull
          docker compose build
          docker compose up -d

          echo "Deployment finished"

          ENDSSH